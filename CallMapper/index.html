<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CallMapper</title>
  <link rel="icon" type="image/x-icon" href="/img/icon.png">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/cytoscape.min.js"></script>
</head>
<body>

<div class="mainDiv">
  <div class="topBar">

      <!-- Title and text -->
      <div class="topLeftInBar"> 
          <img src="/img/icon.png" alt="CallMapper logo" class="logo">
          <span class="title">CallMapper</span>
          <span class="slogan">Visualizing results from WhoYouCalling</span>
      </div>

      <!-- Tabs in the center -->
      <div class="centerInBar">
          <div class="tab active" data-view="view1">Summary</div>
          <div class="tab" data-view="view2">Calls</div>
          <div class="tab" data-view="view3">Sequence</div>
      </div>

      <div class="topRightInBar">
          <!-- Intentionally left empty to balance out the centering -->
      </div>
  </div>

  <div class="content">
      <div id="view1" class="view active">

                <!-- wasd -->

      </div>


      <div id="view2" class="view">
          <div id="cytoscape-view">
            <div id="cytoscape-left-pane">
                Add filtering here :)
            </div>
            <div id="cy"></div>
            <div id="tooltip"></div>
          </div>

      </div>
      <div id="view3" class="view">

        <!-- wasd -->

      </div>
  </div>
</div>


  <script src="/js/ui.js"></script>
  <script src="/js/callmapper.js"></script>
</body>
</html>
